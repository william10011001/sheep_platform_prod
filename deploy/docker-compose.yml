
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: sheep
      POSTGRES_USER: sheep
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    cpus: "${SHEEP_DB_CPUS:-1.0}"
    mem_limit: "${SHEEP_DB_MEM_LIMIT:-1024m}"
    pids_limit: 256
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10

  migrate:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.api
    command: ["sh", "-lc", "python -c 'import sheep_platform_db; sheep_platform_db.init_db()'"]
    depends_on:
      db:
        condition: service_healthy
    environment:
      # 啟用 DigitalOcean PostgreSQL 雲端資料庫 (透過環境變數安全載入)
      SHEEP_DB_URL: "${DO_PG_URL}"
      SHEEP_DB_PATH: ""
      SHEEP_DB_MIGRATION: none
      # [極致修復] 同步傳入管理員憑證，確保資料庫初始化時能一併處理權限
      SHEEP_COMPUTE_USER: ${SHEEP_BOOTSTRAP_ADMIN_USER}
      SHEEP_COMPUTE_PASS: ${SHEEP_BOOTSTRAP_ADMIN_PASS}
    volumes:
      - ${SHEEP_HOST_DATA_DIR:-../app/data}:/app/data
    restart: "no"

  api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.api
    # 關鍵修正 1：對外開放 8000 埠號，打通 Nginx 的連線通道，徹底解決 502 錯誤
    ports:
      - "8000:8000"
    environment:
      SHEEP_DB_URL: "${DO_PG_URL}"
      SHEEP_DB_PATH: ""
      SHEEP_INIT_DB_ON_BOOT: "0"
      SHEEP_API_ROOT_PATH: /sheep123
      SHEEP_GIT_SHA: ${SHEEP_GIT_SHA}
      SHEEP_RUN_SCHEDULER: "0"
      SHEEP_REBUILD_REVIEW_STATE_ON_BOOT: "0"
      # 確保 FastAPI 穩定綁定全域介面
      HOST: "0.0.0.0"
      PORT: "8000"
      # [極致修復] api 容器必須也要拿到管理員帳密，否則無法驗證 compute 節點發來的特權 token 請求，導致 401 bad_credentials
      SHEEP_COMPUTE_USER: ${SHEEP_BOOTSTRAP_ADMIN_USER}
      SHEEP_COMPUTE_PASS: ${SHEEP_BOOTSTRAP_ADMIN_PASS}
    # 關鍵修正 2：解除對 migrate 的強制等待，讓 API 瞬間啟動
    depends_on:
      migrate:
        condition: service_completed_successfully
      db:
        condition: service_healthy
    volumes:
      - ${SHEEP_HOST_DATA_DIR:-../app/data}:/app/data
    restart: always
    cpus: "${SHEEP_API_CPUS:-1.5}"
    mem_limit: "${SHEEP_API_MEM_LIMIT:-1536m}"
    pids_limit: 512
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/healthz"]
      interval: 10s
      timeout: 3s
      retries: 20
    # deploy:
    #   resources:
    #     limits:
    #       cpus: '1.5'          # 限制最多只能使用 1.5 個 CPU 核心
    #       memory: 2G           # 限制最多只能使用 2GB 記憶體

  

  # [Worker 後台服務] 專職負責任務分配，使用較輕量的 api 鏡像
  worker:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.api
    environment:
      SHEEP_DB_URL: "${DO_PG_URL}"
      SHEEP_DB_PATH: ""
      SHEEP_GIT_SHA: ${SHEEP_GIT_SHA:-unknown}
      SHEEP_RUN_SCHEDULER: "0"
      SHEEP_ASSIGN_INTERVAL_S: "30"
      SHEEP_MIN_TASKS: "2"
      SHEEP_MAX_TASKS: "4"
      SHEEP_RUNNABLE_USER_LIMIT: "1000"
      PYTHONUNBUFFERED: "1"
    depends_on:
      api:
        condition: service_healthy
    volumes:
      - ${SHEEP_HOST_DATA_DIR:-../app/data}:/app/data
    restart: always
    cpus: "${SHEEP_WORKER_CPUS:-0.75}"
    mem_limit: "${SHEEP_WORKER_MEM_LIMIT:-768m}"
    pids_limit: 256
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    entrypoint: ["python", "-u", "sheep_worker_daemon.py"]

  compute:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.api
    environment:
      SHEEP_DB_URL: "${DO_PG_URL}"
      SHEEP_DB_PATH: ""
      SHEEP_COMPUTE_API_URL: http://api:8000
      SHEEP_COMPUTE_USER: ${SHEEP_BOOTSTRAP_ADMIN_USER}
      SHEEP_COMPUTE_PASS: ${SHEEP_BOOTSTRAP_ADMIN_PASS}
      SHEEP_COMPUTE_TTL_SECONDS: "2592000"
      SHEEP_COMPUTE_IDLE_S: "1.0"
      SHEEP_COMPUTE_COMMIT_EVERY: "100"
      SHEEP_COMPUTE_FLAG_POLL_S: "5.0"
      SHEEP_MAX_WORKERS: "2"
    depends_on:
      api:
        condition: service_healthy
    volumes:
      - ${SHEEP_HOST_DATA_DIR:-../app/data}:/app/data
    restart: always
    cpus: "${SHEEP_COMPUTE_CPUS:-2.0}"
    mem_limit: "${SHEEP_COMPUTE_MEM_LIMIT:-3072m}"
    pids_limit: 512
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    command: ["python", "-u", "sheep_compute_daemon.py"]

  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/html:/usr/share/nginx/html:ro
      - certbot_www:/var/www/certbot
      - certbot_conf:/etc/letsencrypt
    depends_on:
      # 確保 API 健康後 Nginx 才開始轉發，防止啟動瞬間的 502
      api:
        condition: service_healthy
    restart: always
    cpus: "${SHEEP_NGINX_CPUS:-0.50}"
    mem_limit: "${SHEEP_NGINX_MEM_LIMIT:-256m}"
    pids_limit: 128
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  certbot:
    image: certbot/certbot:latest
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_conf:/etc/letsencrypt
    entrypoint: >
      sh -lc 'echo "Run certbot via docker run on the host (this service is a placeholder)."; sleep 3600'


volumes:
  pgdata:
  certbot_www:
  certbot_conf:
