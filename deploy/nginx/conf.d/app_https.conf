# sheep123.com production nginx (HTTP redirect + HTTPS proxy)

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# Docker embedded DNS; re-resolve service IPs after container recreate
resolver 127.0.0.11 ipv6=off valid=10s;

# ---- HTTP (80): ACME challenge + redirect everything else to HTTPS
server {
    listen 80;
    server_name sheep123.com www.sheep123.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ---- HTTPS (443): real traffic
server {
    listen 443 ssl http2;
    server_name sheep123.com www.sheep123.com;

    ssl_certificate     /etc/letsencrypt/live/sheep123.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sheep123.com/privkey.pem;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Frame-Options "SAMEORIGIN" always;

    client_max_body_size 50m;

    # [專家級修正] 啟用 Gzip 壓縮，解決 2.25MB 未壓縮 JS 檔案造成的下載與渲染阻塞 (FCP 耗時 57 秒的元凶之一)
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        application/x-javascript
        text/javascript
        text/xml
        application/xml
        application/xml+rss
        image/svg+xml;
    gzip_disable "msie6";

    # KEY: keep only HOST in variables so nginx resolves via resolver at runtime
    set $api_host api;

    # 1. 託管純靜態前端 (Vue 3 SPA)，並支援路由回退
    location / {
        root   /usr/share/nginx/html;
        index  index.html;
        # 找不到檔案時，全部回退給 index.html 處理，解決 F5 重新整理 404 問題
        try_files $uri $uri/ /index.html;
    }

    # 2. 保留原本 API 的轉發邏輯，確保 port 號精確對齊 api 容器的 8000
    location /api/ {
        proxy_pass http://api:8000/;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Prefix /api;

        # 針對挖礦大流量與長輪詢進行優化
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        proxy_connect_timeout 3s;
        proxy_buffering off;
        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_next_upstream_tries 10;
    }
}