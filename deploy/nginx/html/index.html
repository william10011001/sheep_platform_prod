<!DOCTYPE html>
<html lang="zh-Hant" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>羊肉爐團隊 挖礦系統</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        cyber: { bg: '#050007', card: 'rgba(18, 2, 5, 0.85)', accent: '#FF003C' }
                    }
                }
            }
        }
    </script>
    <style>
        body { 
            background-color: #0b0d10; color: #f8fafc; 
            font-family: 'DIN Pro', 'Roboto', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
            font-variant-numeric: tabular-nums;
            background-image: radial-gradient(circle at 50% 20%, rgba(255,255,255,0.08) 0%, transparent 60%), linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px);
            background-size: 100% 100%, 40px 40px, 40px 40px;
        }
        .cyber-num {
            font-family: 'DIN Pro', 'Roboto', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif !important;
            font-variant-numeric: tabular-nums !important;
            letter-spacing: -0.02em !important;
            font-weight: 300 !important; /* 強制覆蓋為金融細字體 */
        }
        .cyber-card {
            background: rgba(19, 23, 28, 0.84); border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px; backdrop-filter: blur(10px); box-shadow: 0 10px 30px rgba(0,0,0,0.28);
        }
        .cyber-input { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.10); color: white; transition: all 0.3s; }
        .cyber-input:focus { outline: none; border-color: rgba(255,255,255,0.20); box-shadow: 0 0 0 2px rgba(255,255,255,0.08); }
        .cyber-btn {
            background: rgba(255,255,255,0.92);
            border: 1px solid rgba(255,255,255,0.08); color: #111827; text-shadow: none; transition: all 0.3s;
        }
        .cyber-btn:hover { background: #ffffff; color: #111827; box-shadow: 0 8px 20px rgba(255,255,255,0.10); }
        .tab-btn { padding: 8px 16px; transition: all 0.2s; border-bottom: 2px solid transparent; }
        .tab-active { color: #ffffff; font-weight: 800; border-bottom-color: rgba(255,255,255,0.60); }
        .tab-inactive { color: #8b949e; }
        .tab-inactive:hover { color: white; }

        /* Tooltip 隱藏與懸浮顯示邏輯 */
        .custom-tooltip { position: relative; display: inline-flex; align-items: center; cursor: help; margin-left: 6px; vertical-align: middle; }
        .custom-tooltip .tooltip-icon { width: 14px; height: 14px; border-radius: 50%; background: rgba(255,255,255,0.2); font-size: 10px; display: inline-flex; align-items: center; justify-content: center; color: #e2e8f0; transition: all 0.2s; }
        .custom-tooltip .tooltip-text {
            visibility: hidden; width: 240px; background-color: #1e293b; color: #e2e8f0;
            text-align: left; border-radius: 8px; padding: 10px 12px; font-size: 12px;
            position: absolute; z-index: 99999; bottom: 150%; left: 50%; transform: translateX(-50%);
            opacity: 0; transition: opacity 0.2s; border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 10px 25px rgba(0,0,0,0.8); font-weight: normal; white-space: normal; line-height: 1.5;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        /* 畫出提示框下方的小三角形 */
        .custom-tooltip .tooltip-text::after {
            content: ""; position: absolute; top: 100%; left: 50%; margin-left: -5px;
            border-width: 5px; border-style: solid; border-color: #1e293b transparent transparent transparent;
        }
        .custom-tooltip:hover .tooltip-text { visibility: visible; opacity: 1; }
        .custom-tooltip:hover .tooltip-icon,
        .custom-tooltip .tooltip-text.tooltip-force-open + .tooltip-icon { background: rgba(255,255,255,0.18); color: white; box-shadow: 0 0 8px rgba(255,255,255,0.12); }
        .tooltip-force-open { visibility: visible !important; opacity: 1 !important; }
        
        /* 防裁切修飾：靠右側邊緣的提示框 */
        .custom-tooltip.tooltip-right-edge .tooltip-text {
            left: auto; right: -10px; transform: none;
        }
        .custom-tooltip.tooltip-right-edge .tooltip-text::after {
            left: auto; right: 12px; margin-left: 0;
        }
        
        /* 新增：動態進度條動畫 */
        @keyframes progress-stripes {
            from { background-position: 1rem 0; }
            to { background-position: 0 0; }
        }
        .progress-indeterminate {
            background-image: linear-gradient(45deg, rgba(255,255,255,0.15) 25%, transparent 25%, transparent 50%, rgba(255,255,255,0.15) 50%, rgba(255,255,255,0.15) 75%, transparent 75%, transparent);
            background-size: 1rem 1rem;
            animation: progress-stripes 1s linear infinite;
        }

        /* 專家級滑動驗證碼樣式 */
        .captcha-container { position: relative; width: 100%; height: 40px; background: rgba(255, 255, 255, 0.05); border-radius: 4px; overflow: hidden; border: 1px solid rgba(255, 255, 255, 0.1); margin-top: 10px; user-select: none; }
        .captcha-bg-text { position: absolute; width: 100%; height: 100%; line-height: 40px; text-align: center; color: rgba(255, 255, 255, 0.3); font-size: 14px; pointer-events: none; z-index: 1; }
        .captcha-fill { position: absolute; height: 100%; background: rgba(255, 0, 60, 0.2); width: 0; z-index: 2; border-right: 1px solid rgba(255, 0, 60, 0.5); }
        .captcha-slider { position: absolute; top: 0; left: 0; width: 40px; height: 100%; background: #2a2a2a; border: 1px solid #FF003C; border-radius: 4px; cursor: pointer; z-index: 3; display: flex; align-items: center; justify-content: center; color: #FF003C; font-weight: bold; transition: background 0.2s; box-shadow: 0 0 10px rgba(0,0,0,0.5); }
        .captcha-slider:hover { background: #3a3a3a; box-shadow: 0 0 15px rgba(255,0,60,0.4); }
        .captcha-slider.active { background: #FF003C; color: #fff; cursor: grabbing; }
        .captcha-slider.success { background: #10b981; border-color: #059669; color: #fff; pointer-events: none; }
        .captcha-slider.error { background: #ef4444; border-color: #b91c1c; color: #fff; transition: left 0.3s ease, background 0.3s; }
        .captcha-target-hole { position: absolute; top: 0; width: 40px; height: 100%; border: 2px dashed rgba(255, 0, 60, 0.3); background: rgba(0, 0, 0, 0.3); border-radius: 4px; z-index: 1; box-sizing: border-box; }
        .captcha-fill { background: rgba(255, 255, 255, 0.14) !important; border-right: 1px solid rgba(255, 255, 255, 0.22) !important; }
        .captcha-slider, .captcha-slider.active, .captcha-slider.success, .captcha-slider.error { background: rgba(255,255,255,0.16) !important; border-color: rgba(255,255,255,0.20) !important; color: #f8fafc !important; box-shadow: 0 0 12px rgba(255,255,255,0.08) !important; }
        .captcha-target-hole { border-color: rgba(255,255,255,0.18) !important; }
        .text-amber-400, .text-amber-300, .text-emerald-400, .text-emerald-300, .text-red-400, .text-red-300\/80, .text-red-200, .text-red-500, .text-cyan-300, .text-blue-200, .text-blue-300, .text-blue-400, .text-blue-500, .text-[#FF003C] { color: #f3f4f6 !important; }
        .bg-emerald-600, .bg-emerald-500, .bg-amber-600, .bg-amber-500, .bg-red-600, .bg-red-500, .bg-blue-900\/30, .bg-blue-900\/20, .bg-red-900\/20, .bg-red-900\/50, .bg-emerald-900\/50 { background: rgba(255,255,255,0.06) !important; }
        .border-blue-500, .border-blue-500\/50, .border-red-500, .border-red-500\/40, .border-red-500\/50, .border-red-500\/20, .border-emerald-500, .border-emerald-500\/40 { border-color: rgba(255,255,255,0.10) !important; }
        .from-red-600, .from-red-500, .from-emerald-500, .from-cyan-500, .from-blue-500, .from-amber-500, .to-red-500, .to-emerald-400, .to-blue-500, .to-indigo-400, .to-orange-400 {
            --tw-gradient-from: rgba(255,255,255,0.22) var(--tw-gradient-from-position) !important;
            --tw-gradient-to: rgba(255,255,255,0.10) var(--tw-gradient-to-position) !important;
            --tw-gradient-stops: var(--tw-gradient-from), var(--tw-gradient-to) !important;
        }
        .accent-emerald-500 { accent-color: #d1d5db !important; }
        @media (max-width: 767px) {
            .custom-tooltip .tooltip-text,
            .custom-tooltip.tooltip-right-edge .tooltip-text {
                left: 16px;
                right: 16px;
                bottom: 16px;
                top: auto;
                width: auto;
                transform: none;
                position: fixed;
            }
            .custom-tooltip .tooltip-text::after {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div id="app" class="min-h-screen flex flex-col">
        <div v-if="devtoolsTripped" class="min-h-screen flex items-center justify-center px-6 py-16 bg-black text-white">
            <div class="w-full max-w-xl rounded-2xl border border-white/10 bg-slate-950/95 p-8 text-center shadow-2xl">
                <div class="text-[12px] tracking-[0.35em] uppercase text-slate-500">sheep123.com</div>
                <div class="mt-4 text-6xl font-black text-white">404</div>
                <div class="mt-4 text-xl font-semibold">頁面不存在</div>
                <div class="mt-3 text-sm leading-7 text-slate-400">為保護敏感資料，此頁面已停止顯示。請關閉開發者工具後重新登入。</div>
            </div>
        </div>
        <template v-else>
        <div v-if="toastMsg" class="fixed top-20 left-4 right-4 sm:left-auto sm:right-4 z-[9999] px-4 sm:px-6 py-3 rounded-md shadow-lg border backdrop-blur-md transition-all duration-300"
             :class="toastType === 'error' ? 'bg-red-900/80 border-red-500 text-white' : (toastType === 'success' ? 'bg-emerald-900/80 border-emerald-500 text-white' : 'bg-slate-800/80 border-blue-500 text-white')">
            {{ toastMsg }}
        </div>

        <nav class="border-b border-white/10 bg-black/50 backdrop-blur-md sticky top-0 z-50">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex items-center justify-between h-16">
                <div class="flex items-center gap-3">
                    <span class="font-black text-xl tracking-wider text-white">Open<span class="text-slate-300">Node</span></span>
                </div>
                <div class="flex items-center gap-3" v-if="user">
                    <details class="relative">
                        <summary class="list-none cursor-pointer">
                            <div class="flex items-center gap-3 rounded-full border border-white/10 bg-white/[0.03] px-2.5 py-1.5">
                                <img :src="user.avatar_url" alt="" class="h-8 w-8 rounded-full border border-white/10 object-cover bg-slate-800">
                                <div class="hidden text-left sm:block">
                                    <div class="text-sm text-white">{{ user.display_name || user.nickname || user.username }}</div>
                                    <div class="text-[11px] text-slate-500">@{{ user.username }}</div>
                                </div>
                            </div>
                        </summary>
                        <div class="absolute right-0 mt-3 w-[300px] rounded-2xl border border-white/10 bg-slate-950/95 p-4 shadow-2xl">
                            <div class="flex items-center gap-3">
                                <img :src="profileForm.avatar_url || user.avatar_url" alt="" class="h-14 w-14 rounded-full border border-white/10 object-cover bg-slate-800">
                                <div class="min-w-0">
                                    <div class="text-sm font-semibold text-white truncate">{{ user.display_name || user.nickname || user.username }}</div>
                                    <div class="mt-1 text-xs text-slate-400 truncate">@{{ user.username }}</div>
                                </div>
                            </div>
                            <div class="mt-4 space-y-3">
                                <div>
                                    <label class="mb-1 block text-[11px] text-slate-500">暱稱</label>
                                    <input v-model.trim="profileForm.nickname" type="text" maxlength="16" class="cyber-input w-full rounded-xl px-3 py-2 text-sm" placeholder="請輸入你的暱稱">
                                </div>
                                <div>
                                    <label class="mb-1 block text-[11px] text-slate-500">大頭貼</label>
                                    <input type="file" accept="image/*" @change="handleProfileAvatarChange" class="cyber-input w-full rounded-xl px-3 py-2 text-xs">
                                    <div class="mt-2 flex items-center justify-between gap-2">
                                        <button @click.prevent="clearProfileAvatar" class="rounded-xl border border-white/10 px-3 py-1.5 text-xs text-slate-300 hover:bg-white/5">改用預設頭像</button>
                                        <button @click.prevent="saveProfile" class="cyber-btn rounded-xl px-3 py-1.5 text-xs font-semibold">儲存帳戶設定</button>
                                    </div>
                                </div>
                                <button @click.prevent="logout" class="w-full rounded-xl border border-white/10 px-3 py-2 text-xs text-slate-300 hover:bg-white/5">登出</button>
                            </div>
                        </div>
                    </details>
                </div>
            </div>
        </nav>

        <main class="flex-1 max-w-7xl w-full mx-auto px-4 sm:px-6 lg:px-8 py-8">
            <div v-if="!user && !isLoading" class="max-w-md mx-auto mt-20 cyber-card p-8">
                <h2 class="text-2xl font-black mb-6 text-white">{{ isLoginMode ? '登入' : '註冊' }}</h2>
                <form @submit.prevent="handleAuth" class="space-y-4">
                    <div><input v-model="authForm.username" type="text" placeholder="帳號" required class="cyber-input w-full px-4 py-2 rounded-md"></div>
                    <div v-if="!isLoginMode"><input v-model.trim="authForm.nickname" type="text" placeholder="暱稱（必填）" required class="cyber-input w-full px-4 py-2 rounded-md"></div>
                    <div><input v-model="authForm.password" type="password" placeholder="密碼" required class="cyber-input w-full px-4 py-2 rounded-md"></div>
                    <div v-if="!isLoginMode" class="space-y-2">
                        <div class="text-xs text-slate-400">大頭貼可略過，未設定時會使用系統預設頭像。</div>
                        <input type="file" accept="image/*" @change="handleRegisterAvatarChange" class="cyber-input w-full px-4 py-2 rounded-md text-xs">
                    </div>
                    
                    <div v-show="showCaptchaPanel" class="w-full mt-4 transition-all duration-500">
                        <div class="flex items-center justify-between gap-3 mb-2">
                            <div class="text-xs text-gray-400">為確保安全性，請完成下方滑動驗證：</div>
                            <button type="button" @click="resetCaptcha" class="text-[11px] text-slate-300 border border-white/10 px-2.5 py-1 rounded hover:bg-white/5 transition-colors">重新載入</button>
                        </div>
                        <div v-if="captchaState.phase === 'loading'" class="w-full mt-1 p-3 border border-blue-500/40 bg-blue-900/20 rounded text-blue-200 text-xs text-center">
                            正在載入安全驗證...
                        </div>
                        <div v-else-if="captchaState.phase === 'failed'" class="w-full mt-1 p-3 border border-red-500/50 bg-red-900/20 rounded text-red-200 text-xs text-center">
                            {{ captchaState.message || '無法載入安全驗證碼，請確認網路連線或伺服器狀態。' }}
                        </div>
                        <div v-else-if="captchaState.phase === 'ready' || captchaState.phase === 'verified'" class="captcha-container" ref="captchaContainer">
                            <div class="captcha-bg-text">{{ captchaState.phase === 'verified' ? '驗證成功' : '向右滑動滑塊以完成驗證' }}</div>
                            <div class="captcha-target-hole" v-show="captchaState.targetX > 0 && captchaState.phase !== 'verified'" :style="{ left: captchaState.targetX + 'px' }"></div>
                            <div class="captcha-fill" :style="{ width: (captchaState.currentX + 20) + 'px' }" :class="{'!bg-emerald-500/20 !border-emerald-500': captchaState.phase === 'verified', '!bg-red-500/20 !border-red-500': captchaState.error}"></div>
                            <div class="captcha-slider" 
                                 :class="{ active: captchaState.isDragging, success: captchaState.phase === 'verified', error: captchaState.error }"
                                 :style="{ left: captchaState.currentX + 'px' }"
                                 @mousedown="onSliderDown" @touchstart.prevent="onSliderDown">
                                <span v-if="captchaState.phase === 'verified'">✔</span>
                                <span v-else-if="captchaState.error">✖</span>
                                <span v-else>→</span>
                            </div>
                        </div>
                    </div>

                    <div v-if="errorMsg" class="text-red-500 text-sm font-bold">{{ errorMsg }}</div>
                    <button type="submit" :disabled="!captchaCanSubmit" class="cyber-btn w-full py-2.5 rounded-md font-bold mt-4 disabled:opacity-50 disabled:cursor-not-allowed" :title="!captchaCanSubmit ? '請先完成上方滑動驗證' : ''">{{ isLoginMode ? '登入' : '註冊' }}</button>
                    
                    <div class="text-center pt-2">
                        <button type="button" @click="isLoginMode = !isLoginMode; errorMsg = ''; authForm.nickname = ''; authForm.password = ''; registerAvatarDataUrl = ''; resetCaptcha();" class="text-sm text-gray-400 hover:text-white transition-colors">
                            {{ isLoginMode ? '還沒有帳號？點此註冊' : '已有帳號？返回登入' }}
                        </button>
                    </div>
                </form>
            </div>

            <div v-else-if="user" class="space-y-6">
                <div class="flex gap-2 border-b border-white/10 mb-6 overflow-x-auto">
                    <button @click="currentTab = 'tasks'" :class="currentTab === 'tasks' ? 'tab-active' : 'tab-inactive'" class="tab-btn">挖礦任務</button>
                    <button @click="currentTab = 'dashboard'" :class="currentTab === 'dashboard' ? 'tab-active' : 'tab-inactive'" class="tab-btn">總覽</button>
                    <button @click="currentTab = 'rewards'" :class="currentTab === 'rewards' ? 'tab-active' : 'tab-inactive'" class="tab-btn">獎勵結算</button>
                    <button @click="currentTab = 'rating'" :class="currentTab === 'rating' ? 'tab-active' : 'tab-inactive'" class="tab-btn">評分專區</button>
                    <button @click="currentTab = 'leaderboard'" :class="currentTab === 'leaderboard' ? 'tab-active' : 'tab-inactive'" class="tab-btn">排行榜</button>
                    <button v-if="user && user.role === 'admin'" @click="currentTab = 'admin'; loadAdminData();" :class="currentTab === 'admin' ? 'tab-active border-white/40 text-white' : 'tab-inactive'" class="tab-btn"> 管理員面板</button>
                </div>
                <div v-if="currentTab === 'tasks'" class="space-y-6 animate-fade-in">
                    <div class="cyber-card p-6 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
                        <div class="flex-1 w-full sm:w-auto">
                            <h3 class="text-xl font-bold text-white mb-2">控制面板</h3>
                            <p class="text-sm text-gray-400 mb-4">目前參數搜尋狀態: 
                                <span :class="tasksData.run_enabled ? 'text-slate-100 font-bold' : 'text-slate-300 font-bold'">
                                    {{ tasksData.run_enabled ? '授權中' : '待命中' }}
                                </span>
                            </p>
                            <div class="bg-black/40 border border-white/10 rounded p-3 max-w-xl mb-2">
                                <div class="text-sm text-gray-300 font-bold mb-1">專屬節點 Token</div>
                                <div class="text-xs text-gray-500 mb-2">
                                    複製下方 Token 並貼至 OpenNode 即可啟動運算。
                                    <template v-if="manifest.worker_download_url">
                                        <a :href="manifest.worker_download_url" target="_blank" rel="noopener noreferrer" class="text-slate-200 hover:text-white underline transition-colors">下載 OpenNode</a>
                                        <span class="text-slate-500">({{ manifest.worker_bundle_kind || 'onedir' }})</span>
                                    </template>
                                    <template v-else>
                                        <span class="text-slate-500">目前尚未設定下載連結</span>
                                    </template>
                                </div>
                                <div v-if="manifest.worker_download_sha256" class="mb-2 text-[11px] text-slate-500 font-mono break-all">
                                    SHA256: {{ manifest.worker_download_sha256 }}
                                </div>
                                <div class="flex flex-col sm:flex-row items-stretch sm:items-center gap-2">
                                    <input type="text" readonly :value="userToken" class="cyber-input w-full px-2 py-1.5 rounded text-xs text-slate-100 font-mono bg-black/80 border-white/10" @focus="$event.target.select()">
                                    <button @click="copyToken" class="cyber-btn px-4 py-1.5 rounded font-bold text-xs whitespace-nowrap">一鍵複製</button>
                                    <button @click="refreshWorkerToken" class="px-4 py-1.5 rounded font-bold text-xs whitespace-nowrap border border-white/15 hover:bg-white/10">重新產生</button>
                                </div>
                            </div>
                        </div>
                        <div class="flex gap-3 mt-4 sm:mt-0">
                            <button v-if="!tasksData.run_enabled" @click="startMining" class="cyber-btn px-6 py-2 rounded-md font-bold">開始挖礦</button>
                            <button v-else @click="stopMining" class="px-6 py-2 rounded-md font-bold text-gray-300 border border-gray-600 hover:bg-gray-800">結束挖礦</button>
                        </div>
                    </div>

                    <div class="cyber-card p-4 sm:p-6">
                        <div class="flex justify-between items-center mb-4">
                            <h3 class="text-lg font-bold text-white">派發任務列表</h3>
                            <button @click="loadTasks" class="text-xs text-gray-400 hover:text-white border border-gray-600 px-2 py-1 rounded">↻ 刷新</button>
                        </div>
                        <div class="mb-3 text-xs text-slate-400 sm:hidden">手機版已切換為卡片模式，避免進度條與表格欄位撐爆畫面。</div>
                        <div class="hidden sm:block w-full overflow-x-auto">
                            <table class="w-full text-left border-collapse whitespace-nowrap cyber-num text-[14px] min-w-[860px]">
                                <thead>
                                    <tr class="bg-slate-900/50 text-slate-400">
                                        <th class="py-4 px-6 border-b border-white/5 font-normal">任務編號</th>
                                        <th class="py-4 px-6 border-b border-white/5 font-normal">
                                            所屬策略池
                                            <div class="custom-tooltip">
                                                <div class="tooltip-icon">?</div>
                                                <div class="tooltip-text">目前進行運算的標的與策略組合種類。</div>
                                            </div>
                                        </th>

    <script>
        const { createApp, ref, reactive, onMounted, onUnmounted, computed, watch } = Vue;
        // 註：這行維持你原本的設定，確保你本地 Live Server 能抓到資料
        const API_BASE = '/sheep123'; 

        createApp({
            setup() {
                const user = ref(null);
                const isLoading = ref(true);
                const isLoginMode = ref(true);
                const currentTab = ref('tasks');
                const errorMsg = ref('');
                const pingMs = ref(0);
                let pollTimer = null;
                let livePollTimer = null;
                let devtoolsTimer = null;
                let leaderboardRetryTimer = null;
                let devtoolsDetectionHits = 0;
                
                // 新增 Toast 狀態管理
                const toastMsg = ref('');
                const toastType = ref('info'); // 'info', 'success', 'error'
                let toastTimer = null;
                const showToast = (msg, type = 'info', duration = 3000) => {
                    toastMsg.value = msg;
                    toastType.value = type;
                    if (toastTimer) clearTimeout(toastTimer);
                    if (duration > 0) {
                        toastTimer = setTimeout(() => { toastMsg.value = ''; }, duration);
                    }
                };
                
                const authForm = reactive({ username: '', nickname: '', password: '' });
                const registerAvatarDataUrl = ref('');
                const profileForm = reactive({ nickname: '', avatar_url: '', clear_avatar: false });
                const adminDefaultAvatar = reactive({ avatar_url: '' });
                const activeHelpKey = ref('');
                const dashData = reactive({
                    tasks_count: 0,
                    strategies_active: 0,
                    personal_live_strategies_active: 0,
                    personal_live_strategies_reviewed_label: '個人過審策略',
                    personal_reviewed_strategy_count: 0,
                    personal_live_strategy_count: 0,
                    personal_live_strategy_items: [],
                    personal_active_strategy_count: 0,
                    personal_review_pipeline_count: 0,
                    personal_review_pipeline_hint: '',
                    global_strategies_active: 0,
                    global_live_strategies_reviewed_label: '全域過審策略',
                    global_reviewed_strategy_count: 0,
                    global_live_strategy_count: 0,
                    personal_runtime_portfolio_count: 0,
                    personal_runtime_portfolio_updated_at: '',
                    personal_runtime_portfolio_items: [],
                    personal_runtime_portfolio_stale: false,
                    personal_runtime_portfolio_age_seconds: 0,
                    global_runtime_portfolio_count: 0,
                    global_runtime_portfolio_updated_at: '',
                    global_runtime_portfolio_items: [],
                    global_runtime_portfolio_stale: false,
                    global_runtime_portfolio_age_seconds: 0,
                    runtime_position_items: [],
                    runtime_sync: null,
                    payouts_unpaid: 0,
                    strategies: [],
                    payouts: [],
                    min_sharpe: 0.6
                });
                const manifest = reactive({
                    worker_download_url: '',
                    worker_download_sha256: '',
                    worker_bundle_kind: 'onedir',
                });
                const liveVersions = reactive({
                    dashboard_version: '',
                    leaderboard_version: '',
                    runtime_version: '',
                });
                const devtoolsTripped = ref(false);
                const activeLeaderboardKey = ref('combos');
                
                // 專屬 worker Token 狀態管理
                const workerTokenKey = 'sheep_worker_token';
                const workerTokenOwnerKey = 'sheep_worker_token_user_id';
                const userToken = ref(localStorage.getItem(workerTokenKey) || '');
                const issueWorkerToken = async (force = false, showSuccess = false) => {
                    if (!user.value) return '';
                    const storedOwnerId = localStorage.getItem(workerTokenOwnerKey) || '';
                    const storedToken = localStorage.getItem(workerTokenKey) || '';
                    if (!force && storedToken && String(storedOwnerId) === String(user.value.id || '')) {
                        userToken.value = storedToken;
                        return storedToken;
                    }
                    const res = await fetchApi('/workers/token', {
                        method: 'POST',
                        body: JSON.stringify({ ttl_seconds: 86400 * 30, rotate_existing: !!force })
                    });
                    localStorage.setItem(workerTokenKey, res.token || '');
                    localStorage.setItem(workerTokenOwnerKey, String(res.user_id || user.value.id || ''));
                    userToken.value = res.token || '';
                    if (showSuccess) {
                        showToast('專屬節點 Token 已更新，舊 Token 已自動失效', 'success', 4000);
                    }
                    return userToken.value;
                };
                const refreshWorkerToken = async () => {
                    try {
                        await issueWorkerToken(true, true);
                    } catch (e) {
                        showToast(`重新產生專屬節點 Token 失敗: ${e.message}`, 'error', 4000);
                    }
                };
                const copyToken = async () => {
                    try {
                        if (!userToken.value) {
                            await issueWorkerToken(false, false);
                        }
                        if (!userToken.value) return;
                        await navigator.clipboard.writeText(userToken.value);
                        showToast('專屬節點 Token 已成功複製，請貼至 OpenNode.exe 啟動', 'success', 4000);
                    } catch (err) {
                        showToast('複製失敗，請點擊輸入框手動全選複製', 'error', 3000);
                    }
                };

                // 驗證碼狀態管理
                const captchaContainer = ref(null);
                const captchaState = reactive({
                    token: '',
                    targetX: 0,
                    currentX: 0,
                    phase: 'idle',
                    message: '',
                    isDragging: false,
                    success: false,
                    error: false,
                    startX: 0,
                    tracks: [],
                    startTime: 0
                });
                const showCaptchaPanel = computed(() => !user.value && authForm.username.trim().length > 0 && authForm.password.trim().length > 0);
                const captchaCanSubmit = computed(() => captchaState.phase === 'verified');

                const clearCaptchaState = () => {
                    captchaState.token = '';
                    captchaState.targetX = 0;
                    captchaState.currentX = 0;
                    captchaState.phase = 'idle';
                    captchaState.message = '';
                    captchaState.success = false;
                    captchaState.error = false;
                    captchaState.isDragging = false;
                    captchaState.tracks = [];
                    captchaState.startTime = 0;
                };

                const loadCaptcha = async () => {
                    if (!showCaptchaPanel.value || devtoolsTripped.value) {
                        clearCaptchaState();
                        return;
                    }
                    try {
                        captchaState.phase = 'loading';
                        captchaState.message = '';
                        const res = await fetchApi('/auth/captcha');
                        captchaState.token = res.token;
                        captchaState.targetX = res.target_x;
                        captchaState.currentX = 0;
                        captchaState.success = false;
                        captchaState.error = false;
                        captchaState.tracks = [];
                        captchaState.phase = 'ready';
                    } catch (e) {
                        console.error('加載驗證碼失敗', e);
                        clearCaptchaState();
                        captchaState.phase = 'failed';
                        captchaState.message = e.message || '目前無法載入安全驗證，請稍後再試。';
                        showToast(`加載安全驗證失敗：${captchaState.message}`, 'error', 5000);
                    }
                };

                const resetCaptcha = () => {
                    clearCaptchaState();
                    if (showCaptchaPanel.value) loadCaptcha();
                };

                const onSliderDown = (e) => {
                    if (captchaState.phase === 'verified' || captchaState.phase !== 'ready') return;
                    captchaState.isDragging = true;
                    captchaState.error = false;
                    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                    captchaState.startX = clientX - captchaState.currentX;
                    captchaState.startTime = Date.now();
                    captchaState.tracks.push({ x: captchaState.currentX, y: Math.round(clientY || 0), t: captchaState.startTime });

                    document.addEventListener('mousemove', onSliderMove);
                    document.addEventListener('touchmove', onSliderMove, { passive: false });
                    document.addEventListener('mouseup', onSliderUp);
                    document.addEventListener('touchend', onSliderUp);
                };

                const onSliderMove = (e) => {
                    if (!captchaState.isDragging) return;
                    if (e.cancelable) e.preventDefault();
                    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                    let x = clientX - captchaState.startX;
                    const maxWalk = (captchaContainer.value ? captchaContainer.value.offsetWidth : 300) - 40;
                    if (x < 0) x = 0;
                    if (x > maxWalk) x = maxWalk;
                    captchaState.currentX = x;
                    
                    // 記錄軌跡，用於後端行為分析
                    captchaState.tracks.push({
                        x: Math.round(x),
                        y: e.touches ? Math.round(e.touches[0].clientY) : Math.round(e.clientY),
                        t: Date.now()
                    });
                };

                const onSliderUp = () => {
                    if (!captchaState.isDragging) return;
                    captchaState.isDragging = false;
                    document.removeEventListener('mousemove', onSliderMove);
                    document.removeEventListener('touchmove', onSliderMove);
                    document.removeEventListener('mouseup', onSliderUp);
                    document.removeEventListener('touchend', onSliderUp);

                    // 初步前端驗證，相差小於 5 像素即允許提交
                    if (Math.abs(captchaState.currentX - captchaState.targetX) <= 5) {
                        captchaState.success = true;
                        captchaState.phase = 'verified';
                    } else {
                        captchaState.error = true;
                        captchaState.phase = 'ready';
                        showToast('驗證失敗，請重試', 'error', 2000);
                        setTimeout(() => {
                            resetCaptcha();
                        }, 500);
                    }
                };
                const tasksData = reactive({ tasks: [], run_enabled: false, pending_task_count: 0, active_cycle_id: 0 });
                const leaderboard = reactive({ combos: [], score: [], time: [], points: [], qualified_strategies: [] });
                const leaderboardState = reactive({ phase: 'idle', hasLoaded: false, lastError: '', consecutiveFailures: 0, lastLoadedAt: '' });
                const dashboardHelpTexts = {
                    completed_tasks: '你已完成的個人挖礦任務總數，用來反映累積運算產出。',
                    personal_reviewed: '你挖出的策略中，已通過平台審核的總數。',
                    personal_live: '你已過審的策略中，目前真的被系統選入全域上線組合的數量。',
                    global_reviewed: '所有用戶已通過平台審核的策略總數。',
                    global_live: '目前全站最新發布並實際投入使用的全域策略數量。',
                };

                // 管理員專屬狀態
                const adminSubTab = ref('thresholds');
                const adminThresholds = reactive({ min_trades: 30, min_total_return_pct: 3.0, max_drawdown_pct: 25.0, min_sharpe: 0.6, candidate_keep_top_n: 30 });
                const adminPools = ref([]);
                const adminStrats = ref([]);
                const adminError = ref('');
                const adminDiagnostics = reactive({ runtime_sync: {} });
                const adminStratSummary = reactive({ global_runtime: {}, personal_runtime: {} });
                const adminStratFilters = reactive({ q: '', username: '', symbol: '', direction: '' });
                const adminStratPage = ref(1);
                const adminStratPageSize = ref(50);
                const adminStratTotal = ref(0);
                const adminStratHasNext = ref(false);
                const catalogImportText = ref('');
                const catalogImportResult = ref(null);

                const closeHelp = () => { activeHelpKey.value = ''; };
                const toggleHelp = (key) => {
                    activeHelpKey.value = activeHelpKey.value === key ? '' : key;
                };
                const dashboardHelpText = (key) => dashboardHelpTexts[key] || '';
                const formatPct = (value, appendUnit = true) => {
                    const num = Number(value);
                    if (!Number.isFinite(num)) return '-';
                    return `${num.toFixed(2)}${appendUnit ? '%' : ''}`;
                };
                const formatNumber = (value) => {
                    const num = Number(value);
                    if (!Number.isFinite(num)) return '-';
                    return num.toFixed(Math.abs(num) >= 100 ? 0 : 2);
                };
                const dashboardSummaryCards = computed(() => ([
                    {
                        key: 'completed_tasks',
                        title: '已完成任務',
                        value: dashData.tasks_count || 0,
                        meta: '個人挖礦跑好的任務總數',
                        warning: '',
                    },
                    {
                        key: 'personal_reviewed',
                        title: '個人過審策略',
                        value: dashData.personal_reviewed_strategy_count || 0,
                        meta: '你挖出後已通過審核的策略',
                        warning: '',
                    },
                    {
                        key: 'personal_live',
                        title: '個人上線策略',
                        value: dashData.personal_live_strategy_count || 0,
                        meta: '你的策略中，已被系統選入全域上線組合',
                        warning: '',
                    },
                    {
                        key: 'global_reviewed',
                        title: '全域過審策略',
                        value: dashData.global_reviewed_strategy_count || 0,
                        meta: '所有用戶已通過審核的策略總數',
                        warning: '',
                    },
                    {
                        key: 'global_live',
                        title: '全域上線策略',
                        value: dashData.global_live_strategy_count || 0,
                        meta: formatDate(dashData.global_runtime_portfolio_updated_at) || '等待同步',
                        warning: dashData.global_runtime_portfolio_stale ? '最近同步已超過 10 分鐘' : '',
                    },
                ]));

                const fileToDataUrl = (file, maxBytes = 260 * 1024) => new Promise((resolve, reject) => {
                    if (!file) {
                        resolve('');
                        return;

                const getReviewDetail = (t) => {

                const leaderboardSections = computed(() => ([

                    { key: 'qualified_strategies', title: '個人達標策略', subtitle: '依目前已審核上線策略數排序', unit: '組', rows: leaderboard.qualified_strategies || [] },
                ]));
                const activeLeaderboardSection = computed(() => {

                const leaderboardEmptyStateText = computed(() => {
                    if (leaderboardState.phase === 'loading' && !leaderboardState.hasLoaded) return '排行榜資料同步中，請稍候...';
                    if (leaderboardState.phase === 'error' && !leaderboardState.hasLoaded) return '排行榜暫時無法載入，系統會自動重試。';

                });
                const leaderboardStatusText = computed(() => {

                const manualRefreshLeaderboard = async () => {

                    }

                const formatLeaderboardValue = (key, item) => {
