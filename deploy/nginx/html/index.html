                    const d = new Date(isoStr);
                    return isNaN(d) ? isoStr : d.toLocaleString('zh-TW', { hour12: false });
                };

                const extractApiErrorMessage = (payload) => {
                    if (!payload) return '';
                    if (typeof payload === 'string') return payload;
                    if (Array.isArray(payload)) {
                        return payload.map(item => extractApiErrorMessage(item)).filter(Boolean).join(', ');
                    }
                    if (typeof payload === 'object') {
                        if (payload.code && payload.message) return `${payload.message}`;
                        if (payload.message) return extractApiErrorMessage(payload.message);
                        if (payload.detail) return extractApiErrorMessage(payload.detail);
                        if (payload.error) return extractApiErrorMessage(payload.error);
                        const textValues = Object.values(payload)
                            .map(item => extractApiErrorMessage(item))
                            .filter(Boolean);
                        if (textValues.length) return textValues.join(' / ');
                    }
                    return String(payload);
                };

                const tryParseJsonText = (rawText) => {
                    const text = typeof rawText === 'string' ? rawText.trim() : '';
                    if (!text) return null;
                    try {
                        return JSON.parse(text);
                    } catch (_err) {
                        return null;
                    }
                };

                const readApiPayload = async (res) => {
                    const text = await res.text();
                    const parsed = tryParseJsonText(text);
                    if (parsed !== null) return parsed;
                    return text;
                };

                const describeApiError = async (res) => {
                    const payload = await readApiPayload(res);
                    return extractApiErrorMessage(payload) || (typeof payload === 'string' ? payload : JSON.stringify(payload));
                };

                const fetchApi = async (endpoint, options = {}) => {
                    const token = localStorage.getItem('sheep_token');
                    const headers = { 'Content-Type': 'application/json', ...options.headers };
                    if (token) headers['Authorization'] = `Bearer ${token}`;
                    const start = performance.now();
                    
                    try {
                        const res = await fetch(`${API_BASE}${endpoint}`, { ...options, headers });
                        pingMs.value = Math.round(performance.now() - start);
                        const contentType = res.headers.get("content-type") || "";
                        
                        // [專家級修復] 1. 優先攔截並處理非 JSON 響應 (例如 Cloudflare 的 502 Bad Gateway 網頁)
                        if (!contentType.includes("application/json")) {
                            const payload = await readApiPayload(res);
                            const payloadText = typeof payload === 'string' ? payload : JSON.stringify(payload);
                            if (!res.ok) {
                                const detail = extractApiErrorMessage(payload) || payloadText;
                                throw new Error(`API 請求失敗 (${res.status}): ${detail}`);
                            }
                            if (payloadText.includes('<html') || payloadText.includes('Cloudflare') || payloadText.includes('502 Bad Gateway') || res.status >= 500) {
                                throw new Error(`系統連線異常 (伺服器重啟或網路擁塞)，請稍後再試。`);
                            }
                            throw new Error(`API 錯誤：未收到預期的資料格式，狀態碼 ${res.status}。`);
                        }

                        // [專家級修復] 2. 確認為 JSON 後，再解析業務邏輯的錯誤狀態
                        if (!res.ok) {
                            const payload = await readApiPayload(res);
                            const detail = extractApiErrorMessage(payload) || (typeof payload === 'string' ? payload : JSON.stringify(payload));
                            throw new Error(`API 錯誤 (${res.status}): ${detail}`);
                        }
                        
                        return await readApiPayload(res);
                    } catch (error) {
                        console.error(`[fetchApi Error] ${endpoint}:`, error);
                        throw error;
                    }
                };

                const applyDashboardData = (payload = {}) => {
                    Object.assign(dashData, payload || {});
                    if (payload?.dashboard_version) {
                        liveVersions.dashboard_version = payload.dashboard_version;
                    }
                };

                const applyLeaderboardData = (payload = {}) => {
                    const data = payload?.data || {};
                    const keys = ['combos', 'score', 'time', 'points', 'qualified_strategies'];
                    const nextRows = {
                        combos: Array.isArray(data.combos) ? data.combos : [],
                        score: Array.isArray(data.score) ? data.score : [],
                        time: Array.isArray(data.time) ? data.time : [],
                        points: Array.isArray(data.points) ? data.points : [],
                        qualified_strategies: Array.isArray(data.qualified_strategies) ? data.qualified_strategies : [],
                    };
                    const incomingHasRows = Object.values(nextRows).some(rows => Array.isArray(rows) && rows.length > 0);
                    const existingHasRows = Object.values(leaderboard).some(rows => Array.isArray(rows) && rows.length > 0);
                    const preservedKeys = keys.filter(key => nextRows[key].length === 0 && Array.isArray(leaderboard[key]) && leaderboard[key].length > 0);
                    if (!incomingHasRows && existingHasRows) {
                        leaderboardState.phase = 'error';
                        leaderboardState.lastError = '本輪排行榜統計暫時為空，已保留上一版資料並自動重試。';
                        leaderboardState.consecutiveFailures += 1;
                        if (payload?.leaderboard_version) {
                            liveVersions.leaderboard_version = payload.leaderboard_version;
                        }
                        scheduleLeaderboardRetry();
                        return;
                    }
                    keys.forEach(key => {
                        leaderboard[key] = nextRows[key].length > 0 ? nextRows[key] : (Array.isArray(leaderboard[key]) ? leaderboard[key] : []);
                    });
                    leaderboardState.phase = preservedKeys.length > 0 ? 'error' : 'ready';
                    leaderboardState.hasLoaded = true;
                    leaderboardState.lastError = preservedKeys.length > 0 ? '部分排行榜暫時為空，已保留上一版資料並持續補抓。' : '';
                    leaderboardState.consecutiveFailures = preservedKeys.length > 0 ? leaderboardState.consecutiveFailures + 1 : 0;
                    leaderboardState.lastLoadedAt = payload?.generated_at || new Date().toISOString();
                    if (payload?.leaderboard_version) {
                        liveVersions.leaderboard_version = payload.leaderboard_version;
                    }
                    if (preservedKeys.length > 0) {
                        scheduleLeaderboardRetry();
                    } else {
                        clearLeaderboardRetry();
                    }
                };

                const clearLeaderboardRetry = () => {
                    if (leaderboardRetryTimer) {
                        clearTimeout(leaderboardRetryTimer);
                        leaderboardRetryTimer = null;
                    }
                };

                const scheduleLeaderboardRetry = () => {
                    clearLeaderboardRetry();
                    if (!user.value || devtoolsTripped.value) return;
                    const delay = Math.min(30000, 3000 * Math.max(1, leaderboardState.consecutiveFailures));
                    leaderboardRetryTimer = setTimeout(() => {
                        loadLeaderboardData({ silent: true, preserveExisting: true }).catch(() => {});
                    }, delay);
                };

                const loadManifestData = async () => {
                    const res = await fetchApi('/manifest');
                    Object.assign(manifest, res || {});
                    return res;
                };

                const loadDashboardData = async () => {
                    const res = await fetchApi('/dashboard');
                    applyDashboardData(res || {});
                    return res;
                };

                const loadLeaderboardData = async ({ silent = false, preserveExisting = true } = {}) => {
                    if (!leaderboardState.hasLoaded) {
                        leaderboardState.phase = 'loading';
                    }
                    try {
                        const res = await fetchApi('/leaderboard?period_hours=720');
                        applyLeaderboardData(res || {});
                        if (leaderboardState.phase === 'ready') {
                            clearLeaderboardRetry();
                        }
                        return res;
                    } catch (e) {
                        leaderboardState.phase = 'error';
                        leaderboardState.lastError = e.message || '排行榜暫時無法載入';
                        leaderboardState.consecutiveFailures += 1;
                        if (!preserveExisting) {
                            leaderboard.combos = [];
                            leaderboard.score = [];
                            leaderboard.time = [];
                            leaderboard.points = [];
                            leaderboard.qualified_strategies = [];
                        }
                        if (!silent) {
                            showToast(`排行榜同步失敗：${leaderboardState.lastError}`, 'error', 4000);
                        }
                        scheduleLeaderboardRetry();
                        throw e;
                    }
                };

                const stopLiveVersionPolling = () => {
                    if (livePollTimer) {
                        clearTimeout(livePollTimer);
                        livePollTimer = null;
                    }
                };

                const pollLiveVersionOnce = async () => {
                    if (!user.value || devtoolsTripped.value) return;
                    try {
                        const res = await fetchApi('/live/version');
                        const dashboardChanged = !!liveVersions.dashboard_version && res.dashboard_version !== liveVersions.dashboard_version;
                        const leaderboardChanged = !!liveVersions.leaderboard_version && res.leaderboard_version !== liveVersions.leaderboard_version;
                        const runtimeChanged = !!liveVersions.runtime_version && res.runtime_version !== liveVersions.runtime_version;

                        if (!liveVersions.dashboard_version) liveVersions.dashboard_version = res.dashboard_version || '';
                        if (!liveVersions.leaderboard_version) liveVersions.leaderboard_version = res.leaderboard_version || '';
                        if (!liveVersions.runtime_version) liveVersions.runtime_version = res.runtime_version || '';

                        if (dashboardChanged || runtimeChanged) {
                            await loadDashboardData();
                        }
                        if (leaderboardChanged || !leaderboardState.hasLoaded) {
                            await loadLeaderboardData({ silent: true, preserveExisting: true });
                        }
                        if (user.value?.role === 'admin' && currentTab.value === 'admin' && (dashboardChanged || runtimeChanged)) {
                            await Promise.allSettled([
                                loadAdminStrategies({ resetPage: false }),
                                loadAdminDiagnostics(),
                            ]);
                        }

                        liveVersions.dashboard_version = res.dashboard_version || liveVersions.dashboard_version;
                        liveVersions.leaderboard_version = res.leaderboard_version || liveVersions.leaderboard_version;
                        liveVersions.runtime_version = res.runtime_version || liveVersions.runtime_version;
                    } catch (e) {
                        console.error('[live/version 輪詢失敗]', e);
                    }
                };

                const scheduleLiveVersionPoll = () => {
                    stopLiveVersionPolling();
                    if (!user.value || devtoolsTripped.value) return;
                    const delay = document.visibilityState === 'visible' ? 8000 : 30000;
                    livePollTimer = setTimeout(async () => {
                        await pollLiveVersionOnce();
                        scheduleLiveVersionPoll();
                    }, delay);
                };

                const startLiveVersionPolling = () => {
                    scheduleLiveVersionPoll();
                };

                const isTouchDevice = () => {
                    try {
                        return Boolean(navigator.maxTouchPoints > 0 || window.matchMedia('(pointer: coarse)').matches);
                    } catch (_err) {
                        return false;
                    }
                };

                const isDevtoolsProtectedTab = () => ['tasks', 'dashboard', 'rewards', 'rating', 'admin'].includes(currentTab.value);

                const tripDevtoolsLock = () => {
                    if (devtoolsTripped.value) return;
                    devtoolsTripped.value = true;
                    clearLeaderboardRetry();
                    stopLiveVersionPolling();
                    if (pollTimer) clearInterval(pollTimer);
                    localStorage.removeItem('sheep_token');
                    localStorage.removeItem(workerTokenKey);
                    localStorage.removeItem(workerTokenOwnerKey);
                    user.value = null;
                    userToken.value = '';
                    authForm.username = '';
                    authForm.password = '';
                    tasksData.tasks = [];
                    adminStrats.value = [];
                    clearCaptchaState();
                };

                const checkDevtoolsOpen = () => {
                    if (!user.value || devtoolsTripped.value) return;
                    if (!isDevtoolsProtectedTab()) {
                        devtoolsDetectionHits = 0;
                        return;
                    }
                    if (isTouchDevice()) {
                        devtoolsDetectionHits = 0;
                        return;
                    }
                    const widthGap = window.outerWidth - window.innerWidth;
                    const heightGap = window.outerHeight - window.innerHeight;
                    const detected = document.visibilityState === 'visible' && (widthGap > 220 || heightGap > 220);
                    devtoolsDetectionHits = detected ? (devtoolsDetectionHits + 1) : 0;
                    if (devtoolsDetectionHits >= 3) {
                        tripDevtoolsLock();
                    }
                };

                const checkAuth = async () => {
                    try {
                        const storedToken = localStorage.getItem('sheep_token');
                        if (!storedToken) throw new Error('No token');
                        user.value = await fetchApi('/user/me');
                        profileForm.nickname = user.value?.nickname || user.value?.display_name || user.value?.username || '';
                        profileForm.avatar_url = user.value?.avatar_url || '';
                        profileForm.clear_avatar = false;
                        await issueWorkerToken(false, false);
                        await loadAllData();
                        startLiveVersionPolling();
                        loadManifestData().catch((err) => {
                            console.error('Manifest load failed in background:', err);
                        });
                        loadLeaderboardData({ silent: true, preserveExisting: true }).catch(() => {});
                    } catch (e) { 
                        user.value = null; 
                        userToken.value = '';
                        profileForm.nickname = '';
                        profileForm.avatar_url = '';
                        profileForm.clear_avatar = false;
                        clearLeaderboardRetry();
                        stopLiveVersionPolling();
                        localStorage.removeItem('sheep_token');
                        localStorage.removeItem(workerTokenKey);
                        localStorage.removeItem(workerTokenOwnerKey);
                        if (e.message !== 'No token') {
                            console.error('[checkAuth 錯誤] /user/me 或後續請求失敗:', e);
                            showToast(`獲取使用者資訊失敗: ${e.message}`, 'error', 5000);
                        }
                        if (showCaptchaPanel.value) loadCaptcha();
                        else clearCaptchaState();
                    } 
                    finally { isLoading.value = false; }
                };

                const loadAllData = async () => {
                    const [dashRes, tRes] = await Promise.allSettled([
                        loadDashboardData(),
                        loadTasks()
                    ]);
                    const errors = [];

                    if (dashRes.status !== 'fulfilled') {
                        console.error('Dashboard 載入失敗:', dashRes.reason);
                        errors.push(`總覽: ${dashRes.reason?.message || dashRes.reason}`);
                    }
                    if (tRes.status !== 'fulfilled') {
                        console.error('Tasks 載入失敗:', tRes.reason);
                        errors.push(`任務: ${tRes.reason?.message || tRes.reason}`);
                    }

                    if (errors.length) {
                        showToast(`部分面板資料載入失敗：${errors.join(' | ')}`, 'error', 5000);
                    }
                };

                const loadTasks = async () => {
                    if(!user.value) return;
                    try {
                        const res = await fetchApi('/tasks');
                        tasksData.tasks = res.tasks || [];
                        tasksData.run_enabled = !!res.run_enabled;
                        tasksData.pending_task_count = Number(res.pending_task_count || 0);
                        tasksData.active_cycle_id = Number(res.active_cycle_id || 0);
                    } catch(e) {
                        console.error('[loadTasks 錯誤] 輪詢更新任務失敗:', e);
                        // 背景輪詢錯誤不中斷使用者操作，僅記錄於 Console
                    }
                };

                // 極致修復的驗證邏輯：完整解析後端錯誤，避免誤報
                const handleAuth = async () => {
                    errorMsg.value = ''; 
                    isLoading.value = true;
                    showToast(' 正在驗證登入資訊...', 'info', 0); // 持續顯示直到流程結束
                    
                    try {
                        if (!captchaCanSubmit.value) {
                            throw new Error("請先完成安全滑動驗證");
                        }

                        const endpoint = isLoginMode.value ? '/token' : '/auth/register';
                        const body = isLoginMode.value 
                            ? { 
                                username: authForm.username, password: authForm.password, ttl_seconds: 86400 * 30, name: "web_session",
                                captcha_token: captchaState.token, captcha_offset: captchaState.currentX, captcha_tracks: captchaState.tracks
                              }
                            : { 
                                username: authForm.username, password: authForm.password, nickname: authForm.nickname, avatar_url: registerAvatarDataUrl.value || '', tos_ok: true,
                                captcha_token: captchaState.token, captcha_offset: captchaState.currentX, captcha_tracks: captchaState.tracks
                              };
                            
                        // 注意：如果後端是標準 OAuth2PasswordRequestForm，這裡的 JSON 會報 422 錯誤。
                        // 我們保留原邏輯，但透過強化報錯讓您能第一時間發現。
                        const res = await fetch(`${API_BASE}${endpoint}`, { 
                            method: 'POST', 
                            headers: { 'Content-Type': 'application/json' }, 
                            body: JSON.stringify(body) 
                        });
                        
                        if (!res.ok) {
                            const payload = await readApiPayload(res);
                            const fullError = typeof payload === 'string' ? payload : JSON.stringify(payload);
                            const detail = extractApiErrorMessage(payload) || fullError;
                            
                            if(detail === 'user_exists') throw new Error('註冊失敗：該帳號已被其他人註冊');
                            if(detail === 'password_too_short') throw new Error('註冊失敗：密碼至少需要6個字元');
                            if(detail === 'invalid_username') throw new Error('註冊失敗：帳號格式無效');
                            if(detail === 'nickname_required') throw new Error('註冊失敗：請先設定暱稱');
                            // [專家級修復] 針對 401 狀態碼翻譯，提供使用者友善的白話文錯誤
                            if(detail === 'bad_credentials') throw new Error('登入失敗：帳號或密碼錯誤，請重新確認');
                            if(detail === 'user_disabled') throw new Error('登入失敗：此帳號已被系統停用');
                            if(detail.includes('captcha_unavailable')) throw new Error('安全驗證暫時無法載入，請稍後再試');
                            if(detail.includes('captcha_expired')) throw new Error('安全驗證已過期，請重新載入後再試');
                            if(detail.includes('captcha_mismatch')) throw new Error('滑塊位置未對準，請重新嘗試');
                            if(detail.includes('captcha_invalid')) throw new Error('安全驗證動作異常，請重新滑動驗證');
                            if(detail.includes('captcha_missing')) throw new Error('安全驗證資料不完整，請重新載入後再試');
                            
                            // [專家級修復] 攔截 Cloudflare 520 / 502 等伺服器離線回傳的龐大 HTML，避免擠爆畫面
                            if (fullError.includes('<html') || fullError.includes('Cloudflare')) {
                                throw new Error(`伺服器暫時離線或重啟中 (狀態碼 ${res.status})，請等待 30 秒後再試。`);
                            }
                            
                            // 顯示最詳細的錯誤根因
                            throw new Error(`請求失敗 [狀態碼 ${res.status}]: ${detail}`);
                        }
                        
                        if(!isLoginMode.value) {
                            // 註冊後自動登入
                            showToast(' 註冊成功，正在自動登入...', 'info', 0);
                            const lRes = await fetch(`${API_BASE}/token`, { 
                                method: 'POST', 
                                headers: { 'Content-Type': 'application/json' }, 
                                body: JSON.stringify({
                                    username: authForm.username,
                                    password: authForm.password,
                                    ttl_seconds: 86400 * 30,
                                    name: "web_session",
                                    captcha_token: captchaState.token,
                                    captcha_offset: captchaState.currentX,
                                    captcha_tracks: captchaState.tracks
                                }) 
                            });
                            
                            if (!lRes.ok) {
                                const lErr = await describeApiError(lRes);
                                throw new Error(`自動登入失敗 [狀態碼 ${lRes.status}]: ${lErr}`);
                            }
                            const data = await lRes.json();
                            localStorage.setItem('sheep_token', data.token);
                        } else {
                            const data = await res.json();
                            localStorage.setItem('sheep_token', data.token);
                        }
                        
                        showToast('驗證成功，正在載入資料...', 'success', 2000);
                        await checkAuth(); // 這裡如果報錯也會被下面的 catch 抓到
                        
                        // [專家級修復] 登入或註冊成功後，自動發送 /tasks/start 請求，確保新帳號自動解鎖派發權限
                        try {
                            const startRes = await fetchApi('/tasks/start', { method: 'POST' });
                            await loadTasks(); // 重新拉取任務狀態，確保 UI 變更為「授權中」
                            if (Number(startRes.assigned_count || 0) > 0) {
                                showToast(`已自動啟動個人派工，系統已配置 ${startRes.assigned_count} 個任務`, 'success', 3000);
                            } else {
                                showToast('已自動啟動個人派工，目前沒有可派發任務', 'info', 3000);
                            }
                        } catch (startErr) {
                            console.error('[自動解鎖權限失敗]', startErr);
                            showToast(`自動解鎖權限失敗: ${startErr.message}，請手動點擊開始`, 'error', 4000);
                        }
                        
                    } catch (e) { 
                        console.error('[handleAuth Error]', e);
                        errorMsg.value = e.message; 
                        showToast(`發生錯誤: ${e.message}`, 'error', 5000);
                        // [專家級修復] 驗證失敗或請求失敗時，強制刷新驗證碼防止重放攻擊
                        resetCaptcha();
                    }
                    finally { 
                        isLoading.value = false; 
                    }
                };

                const startMining = async () => {
                    try { 
                        const res = await fetchApi('/tasks/start', { method: 'POST' }); 
                        await loadTasks(); 
                        if (Number(res.assigned_count || 0) > 0) {
                            showToast(`成功啟動個人派工，已配置 ${res.assigned_count} 個任務`, 'success', 3000);
                        } else {
                            showToast('已啟動個人派工，但目前沒有可派發任務', 'info', 3000);
                        }
                    } catch(e) { 
                        showToast(`啟動挖礦失敗: ${e.message}`, 'error', 5000); 
                    }
                };
                const stopMining = async () => {
                    try { 
                        await fetchApi('/tasks/stop', { method: 'POST' }); 
                        await loadTasks(); 
                        showToast('已成功關閉派發授權，將不再接收新任務', 'info', 3000);
                    } catch(e) { 
                        showToast(`停止挖礦失敗: ${e.message}`, 'error', 5000); 
                    }
                };

                const logout = () => { 
                    clearLeaderboardRetry();
                    localStorage.removeItem('sheep_token'); 
                    localStorage.removeItem(workerTokenKey);
                    localStorage.removeItem(workerTokenOwnerKey);
                    userToken.value = ''; 
                    user.value = null; 
                    clearInterval(pollTimer); 
                    stopLiveVersionPolling();
                    
                    // [專家級修復] 登出時徹底清空帳密表單，並重新載入全新的驗證碼狀態
                    // 這樣畫面會因為 authForm 變空而自動隱藏驗證碼區域，直到下一次輸入
                    authForm.username = '';
                    authForm.nickname = '';
                    authForm.password = '';
                    registerAvatarDataUrl.value = '';
                    clearCaptchaState();
                };

                // Helpers
                const getStatusText = (s) => ({'assigned':'配置完畢','queued':'排程中','running':'執行中','completed':'已完成','error':'程序異常'})[s] || s;
                
                const getPhaseText = (t) => { 
                    try { 
                        const phase = JSON.parse(t.progress_json||'{}').phase || 'idle'; 
                        const phaseMap = {
                            'idle': '待命',
                            'queued': '排隊中',
                            'sync_data': '同步資料',
                            'build_grid': '準備參數',
                            'grid_search': '參數運算中',
                            'finished': '已完成',
                            'completed': '已完成',
                            'stopped': '已停止',
                            'error': '發生錯誤'
                        };
                        return phaseMap[phase] || phase;
                    } catch(e) {
                        return '待命';
                    } 
                };

                // 👉 終極精準進度條引擎：包含每秒平滑跳動時長、自動防呆修正、與完美容錯機制
                const getProgressState = (t) => {
                    // 觸發本地響應式更新 (讓畫面每秒重新計算)
                    const _now = localNow.value;
                    
                    try {
                        const p = JSON.parse(t.progress_json || '{}');
                        const phase = p.phase || 'idle';
                        const status = t.status || 'assigned';
                        const errorDetail = p.last_error || p.detail || p.phase_msg || '未知錯誤';

                        let speed = parseFloat(p.speed_cps) || 0;
                        let elapsed = parseFloat(p.elapsed_s) || 0;
                        let total = parseInt(p.combos_total) || 0;
                        let done = parseFloat(p.combos_done) || 0; // 支援小數點平滑跳動
                        
                        const isRunning = (status === 'running');
                        const isCompleted = (status === 'completed');
                        const isError = (status === 'error');

                        // [完美修正 1] 動態補足 elapsed 與 done 差距，達成每秒即時跳動
                        if (isRunning && t.updated_at) {
                            const updatedMs = new Date(t.updated_at + (t.updated_at.endsWith('Z') ? '' : 'Z')).getTime();
                            if (!isNaN(updatedMs)) {
                                const deltaS = (_now - updatedMs) / 1000;
                                // 若更新時間在合理範圍內(300秒)，則將差值加到已耗時上，讓時間與進度每秒平滑走動
                                if (deltaS > 0 && deltaS < 300) {
                                    elapsed += deltaS;
                                    if (speed > 0 && total > 0) {
                                        done += (speed * deltaS);
                                    }
                                }
                            }
                        }

                        // [完美修正 2] 嚴格邊界保護，防止出現 Infinity 或 超出 100% 的進度
                        total = Math.max(0, total);
                        done = Math.max(0, Math.min(done, total)); // 進度絕不允許超過總數
                        elapsed = Math.max(0, elapsed);

                        // [完美修正 3] 補全斷線重連或 Worker 尚未回報 cps 的情形
                        if (speed <= 0.001 && elapsed > 0 && done > 0) {
                            speed = done / elapsed;
                        }

                        // [專家級防呆] 加入 run_enabled 判斷，若使用者已點擊結束挖礦，則不應顯示為運行或切片中
                        const userRunEnabled = tasksData.run_enabled;
                        const isEffectivelyRunning = (isRunning || ((status === 'queued' || status === 'assigned') && done > 0 && total > 0)) && userRunEnabled;

                        if (!userRunEnabled && (status === 'queued' || status === 'assigned')) {
                            const pct = total > 0 ? Math.round((done / total) * 100) : 0;
                            return { text: `已暫停運算 (${Math.floor(done)}/${total})`, percent: pct, isIndeterminate: false, colorClass: 'from-slate-500 to-slate-400', errorDetail: '', timeText: '等待重新啟動...' };
                        }

                        // 時間格式化工具：秒轉換為直觀可讀格式
                        const formatT = (sec) => {
                            if (sec === undefined || sec === null || isNaN(sec) || !isFinite(sec) || sec < 0) return '--';
                            const h = Math.floor(sec / 3600);
                            const m = Math.floor((sec % 3600) / 60);
                            const s = Math.floor(sec % 60);
                            if (h > 0) return `${h}h ${m}m`;
                            if (m > 0) return `${m}m ${s}s`;
                            return `${s}s`;
                        };

                        const getTimeText = () => {
                            if (isError) return elapsed > 0 ? `已耗時 ${formatT(elapsed)}` : '';
                            if (isCompleted) return elapsed > 0 ? `總耗時 ${formatT(elapsed)}` : '';
                            
                            // [專家級修復] 放寬 ETA 顯示條件，只要速度大於極小值就顯示估計，避免卡在估算中
                            if (isEffectivelyRunning && total > 0 && speed > 0.0001) {
                                const remainSec = Math.max(0, (total - done) / speed);
                                const totalSec = Math.max(0, total / speed);
                                return `剩餘 ${formatT(remainSec)} / 總計 ${formatT(totalSec)}`;
                            }
                            if (elapsed > 0) return `已耗時 ${formatT(elapsed)} / 準備算力中...`;
                            return '';
                        };

                        const hasGridProgress = (total > 0);
                        const timeText = getTimeText();

                        if (isError) {
                            return { text: '程序異常', percent: 100, isIndeterminate: false, colorClass: 'from-red-600 to-red-500', errorDetail: errorDetail, timeText };
                        }
                        if (isCompleted) {
                            return { text: '運算完成', percent: 100, isIndeterminate: false, colorClass: 'from-emerald-500 to-emerald-400', errorDetail: '', timeText };
                        }

                        if (phase === 'sync_data') {
                            let st = parseInt(p.sync_total) || 0;
                            let sd = parseInt(p.sync_done) || 0;
                            if (st > 0) {
                                sd = Math.max(0, Math.min(sd, st));
                                const pct = Math.round((sd / st) * 100);
                                return { text: `同步資料 (${sd}/${st})`, percent: pct, isIndeterminate: !isRunning, colorClass: 'from-cyan-500 to-blue-500', errorDetail: '', timeText: timeText || (isRunning ? '資料下載中...' : '排隊等待下載...') };
                            }
                            return { text: p.phase_msg || '同步伺服器資料中...', percent: 100, isIndeterminate: true, colorClass: 'from-cyan-500 to-blue-500', errorDetail: '', timeText };
                        }

                        if (phase === 'build_grid') {
                            let bt = parseInt(p.build_total) || 0;
                            let bd = parseInt(p.build_done) || 0;
                            if (bt > 0) {
                                bd = Math.max(0, Math.min(bd, bt));
                                const pct = Math.round((bd / bt) * 100);
                                return { text: `建構網格 (${bd}/${bt})`, percent: pct, isIndeterminate: !isRunning, colorClass: 'from-purple-500 to-pink-500', errorDetail: '', timeText: timeText || (isRunning ? '參數展開中...' : '排隊等待展開...') };
                            }
                            return { text: '建構參數網格中...', percent: 100, isIndeterminate: true, colorClass: 'from-purple-500 to-pink-500', errorDetail: '', timeText };
                        }

                        // [專家級修復] 強制優先顯示運算進度，即使目前被判定為 assigned/queued
                        if (hasGridProgress || phase === 'grid_search' || phase === 'running' || isEffectivelyRunning) {
                            if (hasGridProgress) {
                                const pct = Math.round((done / total) * 100);
                                // 取消排程等待中的橘黃色干擾，只要有進度就視為暫時切片，保持藍色運算狀態
                                const prefix = isRunning ? '參數運算' : '背景切片中';
                                return { text: `${prefix} (${Math.floor(done)}/${total})`, percent: pct, isIndeterminate: !isEffectivelyRunning, colorClass: 'from-blue-500 to-indigo-400', errorDetail: '', timeText };
                            }
                            return { text: '準備開始運算...', percent: 0, isIndeterminate: true, colorClass: 'from-blue-500 to-indigo-400', errorDetail: '', timeText };
                        }

                        if (status === 'assigned' || status === 'queued') {
                            // [專家級修復] 等待分配算力時，進度應為 0 而非 100，避免前端視覺卡死在滿格
                            return { text: '等待分配算力...', percent: 0, isIndeterminate: true, colorClass: 'from-amber-500 to-orange-400', errorDetail: '', timeText };
                        }

                        return { text: '初始化...', percent: 0, isIndeterminate: true, colorClass: 'from-slate-500 to-slate-400', errorDetail: '', timeText };
                    } catch (e) {
                        return { text: '狀態讀取中...', percent: 0, isIndeterminate: true, colorClass: 'from-slate-500 to-slate-400', errorDetail: '', timeText: '' };
                    }
                };

                const getScoreNumber = (t) => { 
                    const direct = Number(t?.best_any_score ?? -9999);
                    if (!Number.isNaN(direct) && direct !== -9999) return direct;
                    try { return Number(JSON.parse(t.progress_json||'{}').best_any_score || -9999); } 
                    catch(e) { return -9999; } 
                };

                const getScore = (t) => { 
                    const num = getScoreNumber(t);
                    return num !== -9999 ? num.toFixed(6) : '-';
                };
                
                const getShortPoolName = (t) => {
                    let name = t.pool_name || t.family || '-';
                    const match = name.match(/\[(.*?)\]/);
                    if (match) name = match[1];
                    return name.replace('_USDT', '');
                };

                const getScoreColorClass = (t) => {
                    const s = getScoreNumber(t);
                    if (s === -9999) return 'text-slate-500';
                    return s >= 0 ? 'text-emerald-400' : 'text-red-400';
                };

                // [專家級防護] 防止網路緩慢時，3秒定時器狂發請求把 API 伺服器打死 (524 Timeout 的肇因之一)
                let isPolling = false;
                const safePoll = async () => {
                    if(currentTab.value === 'tasks' && !isPolling && user.value) {
                        isPolling = true;
                        await loadTasks();
                        isPolling = false;
                    }
                };

                watch(
                    () => `${authForm.username.trim()}|${authForm.password.trim()}|${isLoginMode.value}`,
                    () => {
                        errorMsg.value = '';
                        if (showCaptchaPanel.value) {
                            if (!captchaState.token || ['idle', 'failed'].includes(captchaState.phase)) {
                                loadCaptcha();
                            }
                        } else {
                            clearCaptchaState();
                        }
                    }
                );

                watch(adminStratPageSize, async (next, prev) => {
                    if (next === prev || !user.value || user.value.role !== 'admin') return;
                    adminStratPage.value = 1;
                    await refreshAdminStrategies(true);
                });

                watch(currentTab, async (nextTab) => {
                    if (nextTab === 'leaderboard' && user.value && !leaderboardState.hasLoaded) {
                        try {
                            await loadLeaderboardData({ silent: true, preserveExisting: true });
                        } catch (_err) {
                        }
                    }
                });

                const handleVisibilityChange = () => {
                    if (user.value && !devtoolsTripped.value) {
                        scheduleLiveVersionPoll();
                    }
                };

                onMounted(() => {
                    checkAuth();
                    pollTimer = setInterval(safePoll, 3000);
                    devtoolsTimer = setInterval(checkDevtoolsOpen, 1500);
                    document.addEventListener('visibilitychange', handleVisibilityChange);
                    // 啟動 1000ms 畫面更新引擎
                    tickTimer = setInterval(() => { localNow.value = Date.now(); }, 1000);
                });
                onUnmounted(() => { 
                    clearInterval(pollTimer); 
                    if (devtoolsTimer) clearInterval(devtoolsTimer);
                    clearLeaderboardRetry();
                    stopLiveVersionPolling();
                    document.removeEventListener('visibilitychange', handleVisibilityChange);
                    if(tickTimer) clearInterval(tickTimer);
                });

                // 👉 修復：確保 return 內輸出的函數名稱與上面定義的完全一致，不包含多餘殘留變數
                return { 
                    user, isLoading, isLoginMode, currentTab, authForm, registerAvatarDataUrl, errorMsg, handleAuth, logout, 
                    profileForm, handleRegisterAvatarChange, handleProfileAvatarChange, clearProfileAvatar, saveProfile,
                    userToken, copyToken, refreshWorkerToken, // 導出 Token 顯示與複製方法
                    captchaContainer, captchaState, showCaptchaPanel, captchaCanSubmit, onSliderDown, resetCaptcha, loadCaptcha, // 導出驗證碼狀態與事件 
                    toastMsg, toastType, // 導出供 UI 使用
                    manifest, dashData, tasksData, leaderboard, devtoolsTripped, pingMs, startMining, stopMining, 
                    getStatusText, getPhaseText, getProgressState, getScore, getScoreNumber,
                    loadTasks, getShortPoolName, getScoreColorClass, formatDate, formatPct, formatNumber,
                    activeHelpKey, toggleHelp, closeHelp, dashboardSummaryCards, dashboardHelpText,
                    activeTasks, activeTaskEmptyStateText, ratingView, setRatingView, paginatedRatingTasks, activeRatingPage, totalRatingPages, changeRatingPage,
                    qualifiedTasks, rejectedArchiveTasks, leaderboardSections, activeLeaderboardKey, activeLeaderboardSection, leaderboardState, leaderboardEmptyStateText, leaderboardStatusText, manualRefreshLeaderboard, formatLeaderboardValue,
                    getReviewStatus, getReviewStatusMeta, getReviewDetail,
                    adminSubTab, adminThresholds, adminPools, adminStrats, adminError, adminDiagnostics, adminStratSummary, adminStratFilters, adminStratPage, adminStratPageSize, adminStratTotal, adminStratHasNext, adminStratTotalPages, adminDefaultAvatar, loadAdminData, refreshAdminStrategies, resetAdminStrategyFilters, changeAdminStratPage, downloadAdminErrors, saveThresholds, savePool, handleDefaultAvatarChange, saveDefaultAvatar, clearDefaultAvatar,
                    catalogImportText, catalogImportResult, handleCatalogFileChange, runCatalogImport
                };
            }
        }).mount('#app');
    </script>
</body>
</html>
